# =============================================================================
# cloudbuild.yaml — Opandz Legal AI Backend
# =============================================================================
#
# Strategy: BUILD ONCE → DEPLOY
# ─────────────────────────────────────────
# A single Docker image is built and pushed to Artifact Registry.
# The Web API is deployed from this image. Background tasks run in-process.
#
# Services deployed:
#   1. backend-api            → uvicorn (FastAPI web server)
#
# =============================================================================
# HOW TO TRIGGER
# =============================================================================
#
# Manual one-off deploy:
#   gcloud builds submit . \
#     --config cloudbuild.yaml \
#     --project=YOUR_PROJECT_ID
#
# Override any substitution at submit time:
#   gcloud builds submit . \
#     --config cloudbuild.yaml \
#     --substitutions _REGION=asia-south2,_REPOSITORY=opandz
#
# Automated trigger (GitHub push to main):
#   gcloud builds triggers create github \
#     --repo-name=YOUR_REPO_NAME \
#     --repo-owner=YOUR_GITHUB_ORG \
#     --branch-pattern="^main$" \
#     --build-config=cloudbuild.yaml \
#     --project=YOUR_PROJECT_ID
#
# =============================================================================
# SUBSTITUTION VARIABLES  (override at trigger time, never hardcode here)
# =============================================================================

substitutions:

  # GCP Project & Location
  _REGION:         "asia-south2"
  _REPOSITORY:     "opandz"

  # Image
  _IMAGE_NAME:     "opandz-backend"

  # Cloud Run Service Names
  _SERVICE_API:           "backend-api"

  # Cloud Run Runtime Config
  _SERVICE_ACCOUNT: "opandz-cloudrun-sa@${PROJECT_ID}.iam.gserviceaccount.com"

  # LLM Configuration
  _LLM_PROVIDER:       "gemini"
  _LLM_MODEL:          "gemini-3.1-flash-lite"
  _VISION_LLM_MODEL:   "gemini-3.1-flash-lite"
  _DOCX_LLM_MODEL:     "gemini-3.1-flash-lite"
  _GCP_LOCATION:       "global"

  # Scaling — API
  _API_MAX_INSTANCES:    "10"
  _API_CONCURRENCY:      "80"
  _API_CPU:              "1"
  _API_MEMORY:           "1Gi"  # Bumping memory slightly since it handles workers in-process

  # VPC Connector (Optional, only needed if accessing other private services)
  _VPC_CONNECTOR:        "my-connector"

# =============================================================================
# OPTIONS
# =============================================================================

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
  dynamic_substitutions: true

# =============================================================================
# STEPS
# =============================================================================

steps:

  # ---------------------------------------------------------------------------
  # Step 0 — Print build context
  # ---------------------------------------------------------------------------
  - id: "info"
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "============================================"
        echo " Opandz Legal AI — Cloud Build Pipeline"
        echo "============================================"
        echo " Project  : ${PROJECT_ID}"
        echo " Region   : ${_REGION}"
        echo " Repo     : ${_REPOSITORY}"
        echo " Image    : ${_IMAGE_NAME}"
        echo " Commit   : ${SHORT_SHA}"
        echo "============================================"

  # ---------------------------------------------------------------------------
  # Step 1 — BUILD the Docker image (executed exactly ONCE)
  # ---------------------------------------------------------------------------
  - id: "build-image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}"
      - "--tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:latest"
      - "--cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:latest"
      - "--build-arg=BUILDKIT_INLINE_CACHE=1"
      - "."
    waitFor: ["info"]

  # ---------------------------------------------------------------------------
  # Step 2 — PUSH both tags to Artifact Registry
  # ---------------------------------------------------------------------------
  - id: "push-image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}"
    waitFor: ["build-image"]

  # ---------------------------------------------------------------------------
  # Step 3 — DEPLOY: backend-api (FastAPI / uvicorn)
  # ---------------------------------------------------------------------------
  - id: "deploy-backend-api"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if gcloud run services describe "${_SERVICE_API}" \
             --region="${_REGION}" --platform=managed \
             --project="${PROJECT_ID}" > /dev/null 2>&1; then
          NO_TRAFFIC_FLAG="--no-traffic"
          echo "Service exists — deploying with --no-traffic (Step 4 will cut over)."
        else
          NO_TRAFFIC_FLAG=""
          echo "New service — deploying without --no-traffic (traffic goes live immediately)."
        fi

        gcloud run deploy "${_SERVICE_API}" \
          --image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}" \
          --region="${_REGION}" \
          --platform=managed \
          --service-account="${_SERVICE_ACCOUNT}" \
          --command=uvicorn \
          --args="app:app,--host,0.0.0.0,--port,8080" \
          --port=8080 \
          --allow-unauthenticated \
          --cpu="${_API_CPU}" \
          --memory="${_API_MEMORY}" \
          --concurrency="${_API_CONCURRENCY}" \
          --max-instances="${_API_MAX_INSTANCES}" \
          --set-env-vars="LLM_PROVIDER=${_LLM_PROVIDER},LLM_MODEL=${_LLM_MODEL},VISION_LLM_MODEL=${_VISION_LLM_MODEL},DOCX_LLM_MODEL=${_DOCX_LLM_MODEL},GCP_LOCATION=${_GCP_LOCATION}" \
          --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_STORAGE_BUCKET=FIREBASE_STORAGE_BUCKET:latest" \
          $$NO_TRAFFIC_FLAG
    waitFor: ["push-image"]

  # ---------------------------------------------------------------------------
  # Step 4 — MIGRATE TRAFFIC to new backend-api revision
  # ---------------------------------------------------------------------------
  - id: "migrate-traffic-api"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "services"
      - "update-traffic"
      - "${_SERVICE_API}"
      - "--region=${_REGION}"
      - "--to-latest"
    waitFor:
      - "deploy-backend-api"

# =============================================================================
# ARTIFACT REGISTRY — final image references recorded in Cloud Build history
# =============================================================================

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:latest"

# =============================================================================
# BUILD TIMEOUT — 30 min, generous for large Python dependency installs
# =============================================================================

timeout: "1800s"
