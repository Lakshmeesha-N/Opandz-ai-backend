# =============================================================================
# cloudbuild.yaml — Opandz Legal AI Backend
# =============================================================================
#
# Strategy: BUILD ONCE → DEPLOY EVERYWHERE
# ─────────────────────────────────────────
# A single Docker image is built and pushed to Artifact Registry.
# The Web API is deployed as a Cloud Run Service.
# The three workers are deployed as Cloud Run Jobs — they run RQ loops and
# have no HTTP endpoint, so Jobs are the correct primitive (no health-check
# requirement, no unwanted scaling behaviour).
#
# Services / Jobs deployed:
#   SERVICE  backend-api            → uvicorn (FastAPI web server)
#   JOB      setup-worker           → python -m src.workers.setup_worker
#   JOB      intake-worker          → python -m src.workers.intake_worker
#   JOB      document-edit-worker   → python -m src.workers.document_edit_worker
#
# =============================================================================
# HOW TO TRIGGER
# =============================================================================
#
# Manual one-off deploy:
#   gcloud builds submit . \
#     --config cloudbuild.yaml \
#     --project=YOUR_PROJECT_ID
#
# Override any substitution at submit time:
#   gcloud builds submit . \
#     --config cloudbuild.yaml \
#     --substitutions _REGION=asia-south2,_REPOSITORY=opandz
#
# Automated trigger (GitHub push to main):
#   gcloud builds triggers create github \
#     --repo-name=YOUR_REPO_NAME \
#     --repo-owner=YOUR_GITHUB_ORG \
#     --branch-pattern="^main$" \
#     --build-config=cloudbuild.yaml \
#     --project=YOUR_PROJECT_ID
#
# =============================================================================
# SUBSTITUTION VARIABLES  (override at trigger time, never hardcode here)
# =============================================================================

substitutions:

  # GCP Project & Location
  _REGION:         "asia-south2"
  _REPOSITORY:     "opandz"

  # Image
  _IMAGE_NAME:     "opandz-backend"

  # Cloud Run Service Name (API only)
  _SERVICE_API:           "backend-api"

  # Cloud Run Job Names (workers — no HTTP server, no health check needed)
  _JOB_SETUP:             "setup-worker"
  _JOB_INTAKE:            "intake-worker"
  _JOB_DOC_EDIT:          "document-edit-worker"

  # Cloud Run Runtime Config
  _SERVICE_ACCOUNT: "opandz-cloudrun-sa@${PROJECT_ID}.iam.gserviceaccount.com"

  # LLM Configuration
  _LLM_PROVIDER:       "gemini"
  _LLM_MODEL:          "gemini-3.1-flash-lite"
  _VISION_LLM_MODEL:   "gemini-3.1-flash-lite"
  _DOCX_LLM_MODEL:     "gemini-3.1-flash-lite"
  _GCP_LOCATION:       "global"

  # Scaling — API Service
  _API_MAX_INSTANCES:    "10"
  _API_CONCURRENCY:      "80"
  _API_CPU:              "1"
  _API_MEMORY:           "512Mi"

  # Resources — Worker Jobs (more RAM for AI inference; parallelism=1 per execution)
  _WORKER_CPU:           "2"
  _WORKER_MEMORY:        "2Gi"
  _WORKER_PARALLELISM:   "1"       # tasks run in parallel within one Job execution
  _WORKER_MAX_RETRIES:   "3"       # automatic retries on non-zero exit

# =============================================================================
# OPTIONS
# =============================================================================

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
  dynamic_substitutions: true

# =============================================================================
# STEPS
# =============================================================================

steps:

  # ---------------------------------------------------------------------------
  # Step 0 — Print build context
  # ---------------------------------------------------------------------------
  - id: "info"
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "============================================"
        echo " Opandz Legal AI — Cloud Build Pipeline"
        echo "============================================"
        echo " Project  : ${PROJECT_ID}"
        echo " Region   : ${_REGION}"
        echo " Repo     : ${_REPOSITORY}"
        echo " Image    : ${_IMAGE_NAME}"
        echo " Commit   : ${SHORT_SHA}"
        echo "--------------------------------------------"
        echo " API Service : ${_SERVICE_API}"
        echo " Worker Jobs : ${_JOB_SETUP}, ${_JOB_INTAKE}, ${_JOB_DOC_EDIT}"
        echo "============================================"

  # ---------------------------------------------------------------------------
  # Step 1 — BUILD the Docker image (executed exactly ONCE)
  #
  # Tagged with both:
  #   - SHORT_SHA  → immutable, pinned to this exact commit
  #   - latest     → mutable convenience pointer
  #
  # Layer caching is enabled via --cache-from latest, dramatically reducing
  # build time on repeated deploys when dependencies haven't changed.
  # ---------------------------------------------------------------------------
  - id: "build-image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}"
      - "--tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:latest"
      - "--cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:latest"
      - "--build-arg=BUILDKIT_INLINE_CACHE=1"
      - "."
    waitFor: ["info"]

  # ---------------------------------------------------------------------------
  # Step 2 — PUSH both tags to Artifact Registry
  #
  # All downstream deploy steps reference the immutable SHORT_SHA tag so every
  # service/job runs byte-for-byte the same image.
  # ---------------------------------------------------------------------------
  - id: "push-image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}"
    waitFor: ["build-image"]

  # ---------------------------------------------------------------------------
  # Step 3a — DEPLOY: backend-api (FastAPI / uvicorn) — Cloud Run SERVICE
  #
  # Public-facing HTTP service. Deployed with --no-traffic first so the new
  # revision can be verified before receiving live traffic (Step 4 migrates it).
  #
  # Command override:  uvicorn app:app --host 0.0.0.0 --port 8080
  # ---------------------------------------------------------------------------
  - id: "deploy-backend-api"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        # Detect whether the service already exists.
        # --no-traffic is only valid on UPDATE (existing service), not CREATE.
        if gcloud run services describe "${_SERVICE_API}" \
             --region="${_REGION}" --platform=managed \
             --project="${PROJECT_ID}" > /dev/null 2>&1; then
          NO_TRAFFIC_FLAG="--no-traffic"
          echo "Service exists — deploying with --no-traffic (Step 4 will cut over)."
        else
          NO_TRAFFIC_FLAG=""
          echo "New service — deploying without --no-traffic (traffic goes live immediately)."
        fi

        gcloud run deploy "${_SERVICE_API}" \
          --image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}" \
          --region="${_REGION}" \
          --platform=managed \
          --service-account="${_SERVICE_ACCOUNT}" \
          --command=uvicorn \
          --args="app:app,--host,0.0.0.0,--port,8080" \
          --port=8080 \
          --allow-unauthenticated \
          --cpu="${_API_CPU}" \
          --memory="${_API_MEMORY}" \
          --concurrency="${_API_CONCURRENCY}" \
          --max-instances="${_API_MAX_INSTANCES}" \
          --set-env-vars="LLM_PROVIDER=${_LLM_PROVIDER},LLM_MODEL=${_LLM_MODEL},VISION_LLM_MODEL=${_VISION_LLM_MODEL},DOCX_LLM_MODEL=${_DOCX_LLM_MODEL},GCP_LOCATION=${_GCP_LOCATION}" \
          --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest,REDIS_URL=REDIS_URL:latest" \
          $$NO_TRAFFIC_FLAG
    waitFor: ["push-image"]

  # ---------------------------------------------------------------------------
  # Step 3b — CREATE/UPDATE: setup-worker — Cloud Run JOB
  #
  # Jobs run to completion and do NOT require an HTTP health check endpoint.
  # `gcloud run jobs create` is used on first deploy; subsequent deploys use
  # `gcloud run jobs update` to swap in the new image.
  #
  # Command override:  python -m src.workers.setup_worker
  #
  # NOTE: To execute the job after deployment, run:
  #   gcloud run jobs execute setup-worker --region=asia-south2
  # Or trigger it from the API / Cloud Scheduler as required.
  # ---------------------------------------------------------------------------
  - id: "deploy-setup-worker"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        JOB_FLAGS=(
          --image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}"
          --region="${_REGION}"
          --service-account="${_SERVICE_ACCOUNT}"
          --command="python"
          --args="-m,src.workers.setup_worker"
          --cpu="${_WORKER_CPU}"
          --memory="${_WORKER_MEMORY}"
          --parallelism="${_WORKER_PARALLELISM}"
          --max-retries="${_WORKER_MAX_RETRIES}"
          --set-env-vars="LLM_PROVIDER=${_LLM_PROVIDER},LLM_MODEL=${_LLM_MODEL},VISION_LLM_MODEL=${_VISION_LLM_MODEL},DOCX_LLM_MODEL=${_DOCX_LLM_MODEL},GCP_LOCATION=${_GCP_LOCATION}"
          --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest,REDIS_URL=REDIS_URL:latest"
        )

        if gcloud run jobs describe "${_JOB_SETUP}" \
             --region="${_REGION}" --project="${PROJECT_ID}" > /dev/null 2>&1; then
          echo "Job exists — updating ${_JOB_SETUP}."
          gcloud run jobs update "${_JOB_SETUP}" "${JOB_FLAGS[@]}"
        else
          echo "Job not found — creating ${_JOB_SETUP}."
          gcloud run jobs create "${_JOB_SETUP}" "${JOB_FLAGS[@]}"
        fi
    waitFor: ["push-image"]

  # ---------------------------------------------------------------------------
  # Step 3c — CREATE/UPDATE: intake-worker — Cloud Run JOB
  #
  # Command override:  python -m src.workers.case_intake_worker
  # ---------------------------------------------------------------------------
  - id: "deploy-intake-worker"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        JOB_FLAGS=(
          --image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}"
          --region="${_REGION}"
          --service-account="${_SERVICE_ACCOUNT}"
          --command="python"
          --args="-m,src.workers.case_intake_worker"
          --cpu="${_WORKER_CPU}"
          --memory="${_WORKER_MEMORY}"
          --parallelism="${_WORKER_PARALLELISM}"
          --max-retries="${_WORKER_MAX_RETRIES}"
          --set-env-vars="LLM_PROVIDER=${_LLM_PROVIDER},LLM_MODEL=${_LLM_MODEL},VISION_LLM_MODEL=${_VISION_LLM_MODEL},DOCX_LLM_MODEL=${_DOCX_LLM_MODEL},GCP_LOCATION=${_GCP_LOCATION}"
          --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest,REDIS_URL=REDIS_URL:latest"
        )

        if gcloud run jobs describe "${_JOB_INTAKE}" \
             --region="${_REGION}" --project="${PROJECT_ID}" > /dev/null 2>&1; then
          echo "Job exists — updating ${_JOB_INTAKE}."
          gcloud run jobs update "${_JOB_INTAKE}" "${JOB_FLAGS[@]}"
        else
          echo "Job not found — creating ${_JOB_INTAKE}."
          gcloud run jobs create "${_JOB_INTAKE}" "${JOB_FLAGS[@]}"
        fi
    waitFor: ["push-image"]

  # ---------------------------------------------------------------------------
  # Step 3d — CREATE/UPDATE: document-edit-worker — Cloud Run JOB
  #
  # Command override:  python -m src.workers.document_edit_worker
  # ---------------------------------------------------------------------------
  - id: "deploy-document-edit-worker"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        JOB_FLAGS=(
          --image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}"
          --region="${_REGION}"
          --service-account="${_SERVICE_ACCOUNT}"
          --command="python"
          --args="-m,src.workers.document_edit_worker"
          --cpu="${_WORKER_CPU}"
          --memory="${_WORKER_MEMORY}"
          --parallelism="${_WORKER_PARALLELISM}"
          --max-retries="${_WORKER_MAX_RETRIES}"
          --set-env-vars="LLM_PROVIDER=${_LLM_PROVIDER},LLM_MODEL=${_LLM_MODEL},VISION_LLM_MODEL=${_VISION_LLM_MODEL},DOCX_LLM_MODEL=${_DOCX_LLM_MODEL},GCP_LOCATION=${_GCP_LOCATION}"
          --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest,REDIS_URL=REDIS_URL:latest"
        )

        if gcloud run jobs describe "${_JOB_DOC_EDIT}" \
             --region="${_REGION}" --project="${PROJECT_ID}" > /dev/null 2>&1; then
          echo "Job exists — updating ${_JOB_DOC_EDIT}."
          gcloud run jobs update "${_JOB_DOC_EDIT}" "${JOB_FLAGS[@]}"
        else
          echo "Job not found — creating ${_JOB_DOC_EDIT}."
          gcloud run jobs create "${_JOB_DOC_EDIT}" "${JOB_FLAGS[@]}"
        fi
    waitFor: ["push-image"]

  # ---------------------------------------------------------------------------
  # Step 4 — MIGRATE TRAFFIC to new backend-api revision
  #
  # Only after ALL four steps have completed successfully does this step
  # execute, cutting over 100% of production traffic to the new API revision.
  # (Worker Jobs have no traffic concept — they are managed above.)
  # ---------------------------------------------------------------------------
  - id: "migrate-traffic-api"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "services"
      - "update-traffic"
      - "${_SERVICE_API}"
      - "--region=${_REGION}"
      - "--to-latest"
    waitFor:
      - "deploy-backend-api"
      - "deploy-setup-worker"
      - "deploy-intake-worker"
      - "deploy-document-edit-worker"

# =============================================================================
# ARTIFACT REGISTRY — final image references recorded in Cloud Build history
# =============================================================================

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:latest"

# =============================================================================
# BUILD TIMEOUT — 30 min, generous for large Python dependency installs
# =============================================================================

timeout: "1800s"